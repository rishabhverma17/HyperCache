# HyperCache Node Configuration Template
# This template is used to generate individual node configurations

node:
  id: "worker-01"
  data_dir: "/tmp/hypercache/worker-01"

network:
  resp_bind_addr: "0.0.0.0"
  resp_port: 8083
  http_bind_addr: "0.0.0.0" 
  http_port: 9083
  advertise_addr: "127.0.0.1"
  gossip_port: 6083

cluster:
  seeds: ["127.0.0.1:6080,127.0.0.1:6081,127.0.0.1:6082,127.0.0.1:6379,127.0.0.1:7000"]
  replication_factor: 3
  consistency_level: "eventual"

persistence:
  enabled: true
  strategy: "hybrid"
  enable_aof: true
  sync_policy: "everysec"
  sync_interval: "1s"
  snapshot_interval: "15m"
  max_log_size: "100MB"
  compression_level: 6
  retain_logs: 3

cache:
  max_memory: "8GB"
  default_ttl: "1h"
  cuckoo_filter_fpp: 0.01

storage:
  wal_sync_interval: "10ms"
  memtable_size: "64MB"
  compaction_threads: 4

stores:
  - name: "default"
    eviction_policy: "lru"
    max_memory: "4GB"
    default_ttl: "1h"
  - name: "sessions"
    eviction_policy: "ttl"
    max_memory: "1GB"
    default_ttl: "30m"
  - name: "analytics"
    eviction_policy: "lfu"
    max_memory: "2GB"
    default_ttl: "24h"

# Logging Configuration
logging:
  level: "debug"
  enable_console: true
  enable_file: true
  log_dir: "logs"
  log_file: "logs/worker-01.log"
  buffer_size: 1000
  max_file_size: "100MB"
  max_files: 10
