# GolangCI-Lint configuration for HyperCache
run:
  timeout: 5m
  go: '1.23.2'
  modules-download-mode: readonly

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment  # Too invasive — 50+ structs would need reordering
      - shadow
  errcheck:
    exclude-functions:
      - (io.Writer).Write
      - (*encoding/json.Encoder).Encode
      - fmt.Fprintf
      - fmt.Printf
  staticcheck:
    checks: ["all", "-SA1012", "-SA4023", "-SA4003", "-SA4031"]  # Disable nil context + always-true warnings
  misspell:
    locale: US

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - typecheck
    - unused

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - govet
        - gosec
        - noctx
        - unparam

    - path: examples/
      linters:
        - errcheck

    - path: cmd/
      linters:
        - errcheck

  max-issues-per-linter: 0
  max-same-issues: 0
