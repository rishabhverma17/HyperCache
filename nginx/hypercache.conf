# Simple Nginx Configuration for HyperCache Load Balancer
# Minimal, reliable configuration

events {
    worker_connections 1024;
}

# Stream module for Redis protocol load balancing
stream {
    # Backend pool for HyperCache nodes
    upstream hypercache_backend {
        least_conn;
        server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;
        
        # Add more nodes by uncommenting:
        # server 127.0.0.1:8083 max_fails=3 fail_timeout=30s;
        # server 127.0.0.1:8084 max_fails=3 fail_timeout=30s;
    }

    # Redis proxy server
    server {
        listen 6379;
        proxy_pass hypercache_backend;
        proxy_timeout 3s;
        proxy_connect_timeout 1s;
    }
}

# HTTP module for health checks
http {
    # Backend pool for HTTP APIs
    upstream hypercache_http_backend {
        server 127.0.0.1:9080;
        server 127.0.0.1:9081;
        server 127.0.0.1:9082;
        
        # Add more nodes by uncommenting:
        # server 127.0.0.1:9083;
        # server 127.0.0.1:9084;
    }

    # Management server
    server {
        listen 8090;
        
        location /health {
            proxy_pass http://hypercache_http_backend/health;
        }
        
        location /status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
}
