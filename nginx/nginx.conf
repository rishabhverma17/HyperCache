events {
    worker_connections 1024;
}

# Stream module for Redis protocol load balancing
stream {
    # Backend pool using Docker service names
    upstream hypercache_backend {
        least_conn;
        server hypercache-1:8080 max_fails=3 fail_timeout=30s;
        server hypercache-2:8080 max_fails=3 fail_timeout=30s;
        server hypercache-3:8080 max_fails=3 fail_timeout=30s;
    }

    # Redis proxy server
    server {
        listen 6379;
        proxy_pass hypercache_backend;
        proxy_timeout 3s;
        proxy_connect_timeout 1s;
    }
}

# HTTP module for health checks
http {
    # Backend pool using Docker service names
    upstream hypercache_http_backend {
        server hypercache-1:9080;
        server hypercache-2:9080;
        server hypercache-3:9080;
    }

    # Management server
    server {
        listen 8080;
        
        location /health {
            proxy_pass http://hypercache_http_backend/health;
        }
        
        location /status {
            stub_status on;
            allow all;
        }
    }
}
