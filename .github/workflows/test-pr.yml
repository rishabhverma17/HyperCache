name: Pull Request Tests

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  GO_VERSION: '1.23.2'

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Download dependencies
      run: go mod download && go mod verify

    - name: Format check
      run: |
        UNFORMATTED=$(find . -name "*.go" -not -path "./examples/*" -exec gofmt -s -l {} \;)
        if [ -n "$UNFORMATTED" ]; then
          echo "Unformatted files:"
          echo "$UNFORMATTED"
          exit 1
        fi

    - name: Vet
      run: go vet ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m

    - name: Build
      run: go build -v ./cmd/hypercache

    - name: Unit tests with coverage
      run: |
        mkdir -p test-results
        go test -race -coverprofile=test-results/coverage.out -covermode=atomic \
          -coverpkg=./internal/...,./pkg/...,./cmd/... -timeout=5m \
          ./internal/... ./pkg/...

    - name: Coverage report
      run: |
        if [ -f "test-results/coverage.out" ]; then
          go tool cover -func=test-results/coverage.out | tail -1
        fi

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pr-test-results
        path: test-results/

  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman
      run: npm install -g newman

    - name: Build and start cluster
      run: |
        mkdir -p bin logs
        go build -o bin/hypercache ./cmd/hypercache
        rm -rf /tmp/hypercache && mkdir -p /tmp/hypercache/node-{1,2,3}
        
        ./bin/hypercache -protocol resp -config configs/node1-config.yaml > logs/node-1.log 2>&1 &
        sleep 3
        ./bin/hypercache -protocol resp -config configs/node2-config.yaml > logs/node-2.log 2>&1 &
        sleep 3
        ./bin/hypercache -protocol resp -config configs/node3-config.yaml > logs/node-3.log 2>&1 &
        sleep 5
        
        for port in 9080 9081 9082; do
          curl -sf http://localhost:$port/health > /dev/null || { cat logs/node-*.log; exit 1; }
        done

    - name: Run Postman smoke test
      run: |
        newman run HyperCache.postman_collection.json \
          --folder "1. Health & Cluster Status" \
          --folder "3. Cache CRUD - Single Node" \
          --folder "9. Cuckoo Filter" \
          --delay-request 2000 \
          --timeout-request 10000

    - name: Cleanup
      if: always()
      run: pkill -f bin/hypercache 2>/dev/null || true
