name: Dependency Updates

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Go Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23.2'

    - name: Update dependencies
      id: changes
      run: |
        echo "Current dependencies:"
        cat go.sum | wc -l
        
        # Update only direct dependencies (avoid traversing examples/ which has separate go.mod)
        go get -u github.com/cespare/xxhash/v2
        go get -u github.com/google/uuid
        go get -u github.com/hashicorp/serf
        go get -u gopkg.in/yaml.v3
        go mod tidy
        
        if git diff --quiet go.mod go.sum; then
          echo "No dependency updates available"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "Dependencies updated"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          git diff go.mod
        fi

    - name: Verify build
      if: steps.changes.outputs.has_changes == 'true'
      run: go build ./cmd/hypercache

    - name: Run tests
      if: steps.changes.outputs.has_changes == 'true'
      run: go test -timeout=3m ./internal/... ./pkg/...

    - name: Create Pull Request
      if: steps.changes.outputs.has_changes == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Go dependencies'
        title: 'chore: update Go dependencies'
        body: |
          Automated dependency update.
          
          - Updated Go modules to latest versions
          - Build and tests pass
        branch: chore/update-dependencies
        delete-branch: true
