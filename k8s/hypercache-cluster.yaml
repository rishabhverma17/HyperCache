apiVersion: v1
kind: Namespace
metadata:
  name: hypercache
  labels:
    app: hypercache
---
# =============================================================================
# HyperCache ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: hypercache-config
  namespace: hypercache
data:
  hypercache.yaml: |
    node:
      id: "${NODE_ID}"
      data_dir: "/data"

    network:
      resp_bind_addr: "0.0.0.0"
      resp_port: 8080
      http_bind_addr: "0.0.0.0"
      http_port: 9080
      advertise_addr: "${POD_IP}"
      gossip_port: 7946

    cluster:
      # Only seed with node-0 — gossip propagates the rest automatically.
      # This makes the cluster scalable to any number of replicas.
      seeds:
        - "hypercache-0.hypercache-headless.hypercache.svc.cluster.local:7946"
      replication_factor: 3
      consistency_level: "eventual"

    persistence:
      enabled: true
      strategy: "hybrid"
      enable_aof: true
      sync_policy: "everysec"
      sync_interval: "1s"
      snapshot_interval: "15m"
      max_log_size: "100MB"
      compression_level: 6
      retain_logs: 3

    cache:
      max_memory: "2GB"
      default_ttl: "0"
      cuckoo_filter_fpp: 0.01
      max_stores: 16

    stores:
      - name: "default"
        eviction_policy: "lru"
        max_memory: "2GB"
        default_ttl: "0"
        cuckoo_filter: true
        persistence: "hybrid"

    logging:
      level: "info"
      enable_console: true
      enable_file: true
      log_dir: "/app/logs"
      buffer_size: 1000
      max_file_size: "100MB"
      max_files: 5
---
# =============================================================================
# HyperCache Headless Service (for gossip + StatefulSet DNS)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: hypercache-headless
  namespace: hypercache
  labels:
    app: hypercache
spec:
  clusterIP: None
  selector:
    app: hypercache
  ports:
  - name: gossip
    port: 7946
    targetPort: 7946
  - name: resp
    port: 8080
    targetPort: 8080
  - name: http
    port: 9080
    targetPort: 9080
---
# =============================================================================
# HyperCache NodePort Service (external access)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: hypercache
  namespace: hypercache
  labels:
    app: hypercache
spec:
  selector:
    app: hypercache
  type: NodePort
  ports:
  - name: resp
    port: 8080
    targetPort: 8080
  - name: http
    port: 9080
    targetPort: 9080
---
# =============================================================================
# HyperCache StatefulSet
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hypercache
  namespace: hypercache
  labels:
    app: hypercache
spec:
  serviceName: hypercache-headless
  replicas: 3
  selector:
    matchLabels:
      app: hypercache
  template:
    metadata:
      labels:
        app: hypercache
    spec:
      initContainers:
      - name: wait-for-seed
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          echo "Waiting for seed node DNS..."
          until nslookup hypercache-0.hypercache-headless.hypercache.svc.cluster.local; do
            sleep 2
          done
          echo "Seed node DNS ready"
      containers:
      - name: hypercache
        image: rishabhverma17/hypercache:latest
        command: ["/hypercache"]
        args: ["--config", "/config/hypercache.yaml", "--protocol", "resp"]
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 8080
          name: resp
        - containerPort: 9080
          name: http
        - containerPort: 7946
          name: gossip
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /data
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 9080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 9080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 9080
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 3
          failureThreshold: 30
      volumes:
      - name: config
        configMap:
          name: hypercache-config
      - name: logs
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
